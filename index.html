<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Acceso Vehicular</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1>🚗 Sistema de Acceso Vehicular</h1>
        <p>Estacionamiento Escolar</p>

    </header>

    <main class="contenedor">

        <section class="card">

            <h2>Registro de Vehículos</h2>

            <form id="formulario">

                <input
                    type="text"
                    id="placa"
                    placeholder="Placa del vehículo"
                    required>

                <input
                    type="text"
                    id="propietario"
                    placeholder="Propietario"
                    required>

                <input
                    type="text"
                    id="marca"
                    placeholder="Marca"
                    required>

                <select id="tipo">

                    <option value="Estudiante">Estudiante</option>
                    <option value="Docente">Docente</option>
                    <option value="Visitante">Visitante</option>

                </select>

                <div class="botones">

                    <button
                        type="button"
                        id="btnEntrada"
                        class="entrada">

                        Registrar Entrada

                    </button>

                    <button
                        type="button"
                        id="btnSalida"
                        class="salida">

                        Registrar Salida

                    </button>

                </div>

            </form>

        </section>

        <section class="card">

            <h2>Historial de Accesos</h2>

            <div class="contador">

                Total de registros:
                <span id="total">

                    0

                </span>

            </div>

            <input
                type="text"
                id="buscar"
                placeholder="Buscar por placa...">

            <div class="tabla-responsive">

    <table>

        <thead>

            <tr>
                <th>Placa</th>
                <th>Propietario</th>
                <th>Marca</th>
                <th>Tipo</th>
                <th>Fecha</th>
                <th>Acción</th>
                <th>Eliminar</th>
            </tr>

        </thead>

        <tbody id="tabla"></tbody>

    </table>

</div>

        </section>

    </main>

    <footer>

        Sistema de Acceso Vehicular |
        Firebase + GitHub Pages

    </footer>

    <script type="module" src="app.js"></script>

</body>

</html>
